<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thursday Asset Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --red: #E53935;
  --bg: #0C0C0C;
  --bg2: #141414;
  --bg3: #1C1C1C;
  --bg4: #262626;
  --line: rgba(255,255,255,0.06);
  --line2: rgba(255,255,255,0.12);
  --text: #F0EDE8;
  --text2: #888;
  --text3: #444;
  --mono: 'DM Mono', monospace;
  --sans: 'Syne', sans-serif;
  --serif: 'Cormorant', serif;
  --r: 4px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column;height:100vh;}

/* ── TOPBAR ── */
.topbar{height:50px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--line);gap:16px;flex-shrink:0;}
.logo{font-family:var(--serif);font-size:17px;font-style:italic;white-space:nowrap;}
.logo b{color:var(--red);font-weight:400;}
.tb-div{width:1px;height:18px;background:var(--line2);}
.tb-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.05em;}
.tb-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.auth-wrap{display:flex;gap:6px;align-items:center;}
.ai{background:var(--bg3);border:1px solid var(--line2);color:var(--text);font-family:var(--mono);font-size:11px;padding:5px 9px;border-radius:var(--r);outline:none;width:160px;}
.ai:focus{border-color:var(--red);}
.ai::placeholder{color:var(--text3);}
.btn{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:6px 14px;border:1px solid transparent;border-radius:var(--r);cursor:pointer;transition:all .12s;white-space:nowrap;}
.btn-red{background:var(--red);color:#fff;border-color:var(--red);}
.btn-red:hover{background:#c62828;}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--line2);}
.btn-ghost:hover{color:var(--text);background:var(--bg3);}
.btn-dim{background:var(--bg3);color:var(--text2);border-color:var(--line);}
.btn-dim:hover{background:var(--bg4);color:var(--text);}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.dot.on{background:#4ade80;box-shadow:0 0 6px #4ade8055;}
.user-txt{font-family:var(--mono);font-size:11px;color:var(--text2);}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:240px;border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.sb-section{border-bottom:1px solid var(--line);padding:14px 16px;}
.sb-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.sb-search{width:100%;background:var(--bg3);border:1px solid var(--line);color:var(--text);font-family:var(--mono);font-size:11px;padding:7px 10px;border-radius:var(--r);outline:none;}
.sb-search:focus{border-color:var(--red);}
.sb-search::placeholder{color:var(--text3);}
.filter-list{display:flex;flex-direction:column;gap:2px;max-height:160px;overflow-y:auto;}
.filter-list::-webkit-scrollbar{width:3px;}
.filter-list::-webkit-scrollbar-thumb{background:var(--bg4);}
.filter-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:3px;cursor:pointer;transition:background .1s;}
.filter-item:hover{background:var(--bg3);}
.filter-item.active{background:var(--red);}
.filter-item.active .fi-name,.filter-item.active .fi-count{color:#fff;}
.fi-name{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
.fi-count{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0;}
.sort-select{width:100%;background:var(--bg3);border:1px solid var(--line);color:var(--text);font-family:var(--mono);font-size:11px;padding:6px 8px;border-radius:var(--r);outline:none;cursor:pointer;}
.sort-select option{background:var(--bg3);}
.price-row{display:flex;gap:6px;align-items:center;}
.price-in{flex:1;background:var(--bg3);border:1px solid var(--line);color:var(--text);font-family:var(--mono);font-size:11px;padding:6px 8px;border-radius:var(--r);outline:none;width:100%;}
.price-in:focus{border-color:var(--red);}
.price-sep{font-size:11px;color:var(--text3);}
.sb-clear{font-family:var(--mono);font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0;letter-spacing:.04em;text-decoration:underline;}
.sb-clear:hover{color:var(--red);}
.sb-scroll{flex:1;overflow-y:auto;}
.sb-scroll::-webkit-scrollbar{width:3px;}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--bg4);}

/* ── BROWSER ── */
.browser-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.browser-bar{height:44px;display:flex;align-items:center;padding:0 16px;gap:10px;border-bottom:1px solid var(--line);flex-shrink:0;}
.b-count{font-family:var(--mono);font-size:11px;color:var(--text3);}
.view-tog{display:flex;gap:2px;margin-left:auto;}
.vtb{background:var(--bg3);border:1px solid var(--line);color:var(--text3);padding:5px 9px;font-size:12px;cursor:pointer;border-radius:2px;transition:all .1s;}
.vtb.active{background:var(--bg4);color:var(--text);border-color:var(--line2);}
.browser{flex:1;overflow-y:auto;padding:16px;}
.browser::-webkit-scrollbar{width:4px;}
.browser::-webkit-scrollbar-thumb{background:var(--bg4);}

/* ── ITEM GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;}
.grid.lg{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));}
.grid.lst{grid-template-columns:1fr;gap:4px;}

/* ── ITEM CARD ── */
.card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;position:relative;transition:border-color .1s,transform .1s;}
.card:hover{border-color:var(--line2);transform:translateY(-1px);}
.card.sel{border-color:var(--red);box-shadow:0 0 0 1px var(--red);}
.card-img-wrap{position:relative;background:var(--bg3);}
.card-img-wrap::after{content:'';display:block;padding-bottom:100%;}
.card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .2s;}
.card-img.ok{opacity:1;}
.card-overlay{position:absolute;inset:0;background:rgba(12,12,12,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;opacity:0;transition:opacity .15s;}
.card:hover .card-overlay{opacity:1;}
.ov-btn{font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:7px 0;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;border-radius:2px;width:130px;text-align:center;transition:all .1s;}
.ov-btn:hover{background:rgba(255,255,255,.18);}
.ov-btn.red{background:var(--red);border-color:var(--red);}
.ov-btn.red:hover{background:#c62828;}
.sel-badge{position:absolute;top:7px;left:7px;background:var(--red);color:#fff;font-family:var(--mono);font-size:9px;padding:3px 7px;border-radius:2px;}
.card-info{padding:9px 11px 11px;}
.c-brand{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.c-meta{display:flex;align-items:center;justify-content:space-between;}
.c-price{font-family:var(--mono);font-size:12px;color:var(--red);font-weight:500;}
.c-tag{font-family:var(--mono);font-size:9px;color:var(--text3);background:var(--bg3);padding:2px 5px;border-radius:2px;text-transform:uppercase;}

/* List card */
.list-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);cursor:pointer;transition:border-color .1s;}
.list-row:hover{border-color:var(--line2);}
.list-row.sel{border-color:var(--red);}
.list-thumb{width:46px;height:46px;object-fit:cover;border-radius:2px;background:var(--bg3);flex-shrink:0;}
.list-info{flex:1;min-width:0;}
.list-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px;}
.list-price{font-family:var(--mono);font-size:12px;color:var(--red);flex-shrink:0;}
.list-acts{display:flex;gap:4px;flex-shrink:0;}

/* ── RIGHT PANEL ── */
.panel{width:300px;border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.panel-hdr{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.panel-title{font-family:var(--mono);font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;}
.panel-cnt{font-family:var(--mono);font-size:11px;color:var(--red);}
.sel-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:5px;}
.sel-list::-webkit-scrollbar{width:3px;}
.sel-list::-webkit-scrollbar-thumb{background:var(--bg4);}
.sel-item{display:flex;gap:9px;align-items:center;padding:7px 9px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);}
.sel-thumb{width:40px;height:40px;object-fit:cover;border-radius:2px;background:var(--bg3);flex-shrink:0;}
.sel-info{flex:1;min-width:0;}
.sel-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.sel-meta{font-family:var(--mono);font-size:10px;color:var(--text3);}
.sel-rm{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:2px 3px;flex-shrink:0;transition:color .1s;}
.sel-rm:hover{color:var(--red);}
.sel-empty{text-align:center;padding:32px 16px;color:var(--text3);font-family:var(--mono);font-size:11px;line-height:1.8;}

/* Export */
.exp-section{border-top:1px solid var(--line);padding:14px;flex-shrink:0;}
.exp-title{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.exp-opts{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.exp-opt{display:flex;align-items:flex-start;gap:7px;cursor:pointer;}
.exp-opt input[type=checkbox]{accent-color:var(--red);width:12px;height:12px;cursor:pointer;flex-shrink:0;margin-top:2px;}
.opt-label{font-size:11px;color:var(--text2);}
.opt-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:1px;}
.subopts{padding-left:19px;display:flex;flex-direction:column;gap:3px;margin-top:3px;}
.subopt{display:flex;align-items:center;gap:5px;cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--text3);}
.subopt input{accent-color:var(--red);cursor:pointer;}
.exp-prog{margin-top:8px;display:none;}
.prog-bar{height:2px;background:var(--bg3);border-radius:1px;overflow:hidden;margin-bottom:5px;}
.prog-fill{height:100%;background:var(--red);width:0;transition:width .2s;}
.prog-lbl{font-family:var(--mono);font-size:10px;color:var(--text3);}


/* ── COLLAPSIBLE PANELS ── */
.sidebar.collapsed { width: 40px; }
.sidebar.collapsed .sb-scroll,
.sidebar.collapsed .sb-section { display: none; }
.sidebar.collapsed .sb-collapse-btn { transform: rotate(180deg); }
.panel.collapsed { width: 40px; }
.panel.collapsed .sel-list,
.panel.collapsed .exp-section,
.panel.collapsed .panel-hdr .panel-title,
.panel.collapsed .panel-hdr .panel-cnt { display: none; }
.panel.collapsed .panel-hdr { justify-content: center; padding: 0; height: 100%; flex-direction: column; gap: 16px; }
.panel.collapsed .panel-collapse-btn { transform: rotate(180deg); }
.sb-top { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.sb-top-label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; }
.collapse-btn { background: none; border: 1px solid var(--line); color: var(--text3); width: 24px; height: 24px; border-radius: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all .15s; flex-shrink: 0; }
.collapse-btn:hover { border-color: var(--line2); color: var(--text); }
.sidebar.collapsed .sb-top { padding: 10px 8px; justify-content: center; }
.sidebar.collapsed .sb-top-label { display: none; }
.sidebar { transition: width .2s ease; }
.panel { transition: width .2s ease; }

/* ── DETAIL MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:6px;width:700px;max-width:94vw;max-height:88vh;display:flex;overflow:hidden;}
.modal-img-side{width:320px;flex-shrink:0;background:var(--bg3);position:relative;}
.modal-img{width:100%;height:100%;object-fit:cover;}
.modal-body{flex:1;padding:28px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
.modal-body::-webkit-scrollbar{width:3px;}
.modal-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:18px;width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-brand{font-family:var(--mono);font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;}
.modal-name{font-size:22px;font-weight:700;line-height:1.2;}
.modal-price{font-family:var(--mono);font-size:20px;color:var(--red);font-weight:500;}
.modal-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.modal-meta-item{background:var(--bg3);border-radius:3px;padding:8px 10px;}
.mmi-label{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.mmi-val{font-size:12px;color:var(--text);}
.modal-desc{font-size:12px;color:var(--text2);line-height:1.6;}
.modal-acts{display:flex;gap:7px;flex-wrap:wrap;margin-top:auto;}
.modal-acts .btn{flex:1;}

/* State */
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;gap:10px;color:var(--text3);}
.spinner{width:22px;height:22px;border:2px solid var(--bg4);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg4);color:var(--text);font-family:var(--mono);font-size:11px;padding:9px 18px;border-radius:var(--r);border:1px solid var(--line2);z-index:999;pointer-events:none;opacity:0;transition:opacity .2s;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">thursday <b>[th]</b> asset studio</div>
  <div class="tb-div"></div>
  <div class="tb-label">Designer sourcing tool</div>
  <div class="tb-right">
    <div id="auth-out" class="auth-wrap">
      <input class="ai" type="email" id="ei" placeholder="email" autocomplete="email">
      <input class="ai" type="password" id="pi" placeholder="password" style="width:120px" onkeydown="if(event.key==='Enter')login()">
      <button class="btn btn-red" onclick="login()">Sign in</button>
    </div>
    <div id="auth-in" style="display:none" class="auth-wrap">
      <div class="dot on"></div>
      <div class="user-txt" id="utxt"></div>
      <button class="btn btn-ghost" style="padding:5px 10px;font-size:10px" onclick="logout()">Out</button>
    </div>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-top">
      <span class="sb-top-label">Filters</span>
      <button class="collapse-btn sb-collapse-btn" onclick="toggleSidebar()" title="Collapse filters">‹</button>
    </div>
    <div class="sb-section" id="sb-search-section">
      <div class="sb-label">Search</div>
      <input class="sb-search" type="text" placeholder="Name, brand, seller..." oninput="doSearch(this.value)" id="sb-search">
    </div>

    <div class="sb-scroll">
      <div class="sb-section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div class="sb-label" style="margin:0">Sort by</div>
        </div>
        <select class="sort-select" onchange="doSort(this.value)">
          <option value="default">Default</option>
          <option value="price_asc">Price: Low → High</option>
          <option value="price_desc">Price: High → Low</option>
          <option value="name_asc">Name: A → Z</option>
          <option value="brand_asc">Brand: A → Z</option>
          <option value="newest">Newest first</option>
        </select>
      </div>

      <div class="sb-section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div class="sb-label" style="margin:0">Price range</div>
        </div>
        <div class="price-row">
          <input class="price-in" type="number" id="pmin" placeholder="Min $" oninput="applyFilters()">
          <div class="price-sep">—</div>
          <input class="price-in" type="number" id="pmax" placeholder="Max $" oninput="applyFilters()">
        </div>
      </div>

      <div class="sb-section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div class="sb-label" style="margin:0">Category</div>
          <button class="sb-clear" onclick="clearFilter('cat')">clear</button>
        </div>
        <div class="filter-list" id="cat-list"></div>
      </div>

      <div class="sb-section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div class="sb-label" style="margin:0">Brand</div>
          <button class="sb-clear" onclick="clearFilter('brand')">clear</button>
        </div>
        <input class="sb-search" type="text" placeholder="Search brands..." oninput="renderBrandFilter(this.value)" style="margin-bottom:8px">
        <div class="filter-list" id="brand-list"></div>
      </div>

      <div class="sb-section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div class="sb-label" style="margin:0">Seller</div>
          <button class="sb-clear" onclick="clearFilter('seller')">clear</button>
        </div>
        <input class="sb-search" type="text" placeholder="Search sellers..." oninput="renderSellerFilter(this.value)" style="margin-bottom:8px">
        <div class="filter-list" id="seller-list"></div>
      </div>

      <div class="sb-section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div class="sb-label" style="margin:0">Condition</div>
          <button class="sb-clear" onclick="clearFilter('cond')">clear</button>
        </div>
        <div class="filter-list" id="cond-list"></div>
      </div>
    </div>
  </div>

  <!-- BROWSER -->
  <div class="browser-wrap">
    <div class="browser-bar">
      <div class="b-count" id="b-count">—</div>
      <div class="view-tog">
        <button class="vtb active" onclick="setView('grid',this)">▦</button>
        <button class="vtb" onclick="setView('lg',this)">◻</button>
        <button class="vtb" onclick="setView('lst',this)">☰</button>
      </div>
    </div>
    <div class="browser" id="browser">
      <div class="state-msg" id="state">
        <div class="spinner" id="spinner" style="display:none"></div>
        <div id="state-title">Sign in to load inventory</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text3)" id="state-sub">Use your Thursday admin credentials</div>
      </div>
    </div>
  </div>

  <!-- PANEL -->
  <div class="panel" id="panel">
    <div class="panel-hdr" id="panel-hdr">
      <div class="panel-title">Selected</div>
      <div class="panel-cnt" id="sel-cnt">0 items</div>
      <button class="collapse-btn panel-collapse-btn" onclick="togglePanel()" title="Collapse panel">›</button>
    </div>
    <div class="sel-list" id="sel-list">
      <div class="sel-empty">Hover any item → click<br><b style="color:var(--text2)">+ Select</b> to add it here</div>
    </div>
    <div class="exp-section">
      <div class="exp-title">Export options</div>
      <div class="exp-opts">
        <label class="exp-opt">
          <input type="checkbox" id="o-transp" checked>
          <div><div class="opt-label">Transparent PNG</div><div class="opt-sub">Background removed</div></div>
        </label>
        <label class="exp-opt">

  <div class="modal">

      <button class="modal-close" onclick="closeModal()">×</button>

<canvas id="cc" style="display:none"></canvas>
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────
const API = 'https://api.thursday-thrift.club/buyer';
const FB_KEY = 'AIzaSyDhhtc1CGwhmvmISh6TB9gbNb2QpKWbaMM';
// remove.bg key stored in localStorage only — never shown in UI
// To set: open browser console and type: localStorage.setItem('rmbg','YOUR_KEY_HERE')

// ── STATE ───────────────────────────────────────
const S = {
  token: null,
  items: [],
  filtered: [],
  selected: [],
  filters: { cat: null, brand: null, seller: null, cond: null },
  sort: 'default',
  search: '',
  view: 'grid',
  modalItem: null,
};

// ── AUTH ────────────────────────────────────────
const SESSION_KEY = 'th_session';

async function login() {
  const email = document.getElementById('ei').value.trim();
  const pass = document.getElementById('pi').value;
  if (!email || !pass) return;
  setMsg(true, 'Signing in...', '');
  try {
    const r = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${FB_KEY}`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pass, returnSecureToken: true})
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message.replace(/_/g,' ').toLowerCase());
    saveSession(d);
    onAuthSuccess(d.email);
    await loadItems();
  } catch(e) { setMsg(false, 'Sign in failed', e.message); }
}

function saveSession(d) {
  S.token = d.idToken;
  const session = {
    idToken: d.idToken,
    refreshToken: d.refreshToken,
    email: d.email,
    expiresAt: Date.now() + parseInt(d.expiresIn || 3600) * 1000
  };
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
}

async function refreshToken() {
  const session = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
  if (!session?.refreshToken) return false;
  try {
    const r = await fetch(`https://securetoken.googleapis.com/v1/token?key=${FB_KEY}`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({grant_type: 'refresh_token', refresh_token: session.refreshToken})
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    const updated = {
      idToken: d.id_token,
      refreshToken: d.refresh_token,
      email: session.email,
      expiresAt: Date.now() + parseInt(d.expires_in || 3600) * 1000
    };
    localStorage.setItem(SESSION_KEY, JSON.stringify(updated));
    S.token = d.id_token;
    return true;
  } catch(e) {
    console.warn('Token refresh failed:', e.message);
    localStorage.removeItem(SESSION_KEY);
    return false;
  }
}

async function ensureValidToken() {
  const session = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
  if (!session) return false;
  // Refresh if expiring within 5 minutes
  if (Date.now() > session.expiresAt - 300000) {
    return await refreshToken();
  }
  S.token = session.idToken;
  return true;
}

function onAuthSuccess(email) {
  document.getElementById('auth-out').style.display = 'none';
  document.getElementById('auth-in').style.display = 'flex';
  document.getElementById('utxt').textContent = email.split('@')[0];
}

function logout() {
  S.token = null; S.items = []; S.filtered = []; S.selected = [];
  localStorage.removeItem(SESSION_KEY);
  document.getElementById('auth-out').style.display = 'flex';
  document.getElementById('auth-in').style.display = 'none';
  setMsg(false, 'Sign in to load inventory', 'Use your Thursday admin credentials');
  renderBrowser(); renderPanel();
}

async function tryAutoLogin() {
  const session = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
  if (!session) return;
  setMsg(true, 'Resuming session...', '');
  const ok = await ensureValidToken();
  if (ok) {
    onAuthSuccess(session.email);
    await loadItems();
  } else {
    setMsg(false, 'Sign in to load inventory', 'Use your Thursday admin credentials');
  }
}

// Auto-refresh token every 55 minutes while page is open
setInterval(async () => {
  const session = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
  if (session && S.token) await refreshToken();
}, 55 * 60 * 1000);

// ── DATA ────────────────────────────────────────
async function loadItems() {
  setMsg(true, 'Loading inventory...', '');
  try {
    await ensureValidToken();
    const r = await fetch(`${API}/inventory/items`, {headers:{Authorization:`Bearer ${S.token}`}});
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const raw = Array.isArray(data) ? data : (data.items || data.data || []);
    S.items = raw.filter(i => i.status === 'AVAILABLE' && i.isLive !== false);
    buildFilters();
    applyFilters();
  } catch(e) { setMsg(false, 'Failed to load items', e.message); }
}

function getImg(item) {
  if (item.images?.length) {
    const p = item.images.find(i => i.isPrimary) || item.images[0];
    return p?.url || '';
  }
  return item.imageUrl || '';
}

function getSellerName(item) {
  if (item.seller) {
    return item.seller.businessName ||
      `${item.seller.user?.firstName||''} ${item.seller.user?.lastName||''}`.trim() ||
      item.seller.user?.username || '';
  }
  // fallback: look up from our seller map
  return S.sellerMap?.[item.sellerId] || `Seller #${item.sellerId}`;
}

function getCat(item) {
  if (!item.categories?.length) return 'Uncategorized';
  const top = item.categories.find(c => c.category && !c.category.parentId) || item.categories[0];
  return top?.category?.name || 'Uncategorized';
}

// ── FILTERS BUILD ───────────────────────────────
function buildFilters() {
  // Build seller name map
  S.sellerMap = {};
  S.items.forEach(i => { if (i.seller) S.sellerMap[i.sellerId] = getSellerName(i); });

  renderCatFilter();
  renderBrandFilter('');
  renderSellerFilter('');
  renderCondFilter();
}

function renderCatFilter() {
  const counts = {};
  S.items.forEach(i => { const c = getCat(i); counts[c] = (counts[c]||0)+1; });
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  document.getElementById('cat-list').innerHTML = sorted.map(([c,n]) =>
    `<div class="filter-item${S.filters.cat===c?' active':''}" onclick="setFilter('cat','${c}')">
      <span class="fi-name">${c}</span><span class="fi-count">${n}</span>
    </div>`).join('');
}

function renderBrandFilter(q) {
  const counts = {};
  S.items.forEach(i => { const b = i.brandName||'Unknown'; counts[b] = (counts[b]||0)+1; });
  let sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  if (q) sorted = sorted.filter(([b]) => b.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('brand-list').innerHTML = sorted.slice(0,40).map(([b,n]) =>
    `<div class="filter-item${S.filters.brand===b?' active':''}" onclick="setFilter('brand','${b.replace(/'/g,"\\'")}')">
      <span class="fi-name">${b}</span><span class="fi-count">${n}</span>
    </div>`).join('');
}

function renderSellerFilter(q) {
  const counts = {};
  S.items.forEach(i => {
    const name = getSellerName(i) || `Seller #${i.sellerId}`;
    const key = `${i.sellerId}|||${name}`;
    counts[key] = (counts[key]||0)+1;
  });
  let entries = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  if (q) entries = entries.filter(([k]) => k.split('|||')[1].toLowerCase().includes(q.toLowerCase()));
  document.getElementById('seller-list').innerHTML = entries.slice(0,40).map(([k,n]) => {
    const [id, name] = k.split('|||');
    return `<div class="filter-item${S.filters.seller===id?' active':''}" onclick="setFilter('seller','${id}')">
      <span class="fi-name">${name}</span><span class="fi-count">${n}</span>
    </div>`;
  }).join('');
}

function renderCondFilter() {
  const conds = ['NEW','LIKE_NEW','EXCELLENT','GOOD','FAIR'];
  const labels = {NEW:'New',LIKE_NEW:'Like New',EXCELLENT:'Excellent',GOOD:'Good',FAIR:'Fair'};
  const counts = {};
  S.items.forEach(i => { const c = i.condition||'UNKNOWN'; counts[c] = (counts[c]||0)+1; });
  document.getElementById('cond-list').innerHTML = conds.filter(c => counts[c]).map(c =>
    `<div class="filter-item${S.filters.cond===c?' active':''}" onclick="setFilter('cond','${c}')">
      <span class="fi-name">${labels[c]||c}</span><span class="fi-count">${counts[c]||0}</span>
    </div>`).join('');
}

function setFilter(type, val) {
  S.filters[type] = S.filters[type] === val ? null : val;
  applyFilters();
  if (type==='cat') renderCatFilter();
  if (type==='brand') renderBrandFilter('');
  if (type==='seller') renderSellerFilter('');
  if (type==='cond') renderCondFilter();
}

function clearFilter(type) {
  S.filters[type] = null;
  applyFilters();
  if (type==='cat') renderCatFilter();
  if (type==='brand') renderBrandFilter('');
  if (type==='seller') renderSellerFilter('');
  if (type==='cond') renderCondFilter();
}

// ── APPLY FILTERS + SORT ────────────────────────
function doSearch(q) { S.search = q.toLowerCase(); applyFilters(); }
function doSort(v) { S.sort = v; applyFilters(); }

function applyFilters() {
  let items = [...S.items];

  if (S.search) items = items.filter(i =>
    (i.name||'').toLowerCase().includes(S.search) ||
    (i.brandName||'').toLowerCase().includes(S.search) ||
    getSellerName(i).toLowerCase().includes(S.search) ||
    getCat(i).toLowerCase().includes(S.search)
  );

  if (S.filters.cat) items = items.filter(i => getCat(i) === S.filters.cat);
  if (S.filters.brand) items = items.filter(i => (i.brandName||'Unknown') === S.filters.brand);
  if (S.filters.seller) items = items.filter(i => String(i.sellerId) === String(S.filters.seller));
  if (S.filters.cond) items = items.filter(i => i.condition === S.filters.cond);

  const pmin = parseFloat(document.getElementById('pmin')?.value);
  const pmax = parseFloat(document.getElementById('pmax')?.value);
  if (!isNaN(pmin)) items = items.filter(i => parseFloat(i.price) >= pmin);
  if (!isNaN(pmax)) items = items.filter(i => parseFloat(i.price) <= pmax);

  switch(S.sort) {
    case 'price_asc': items.sort((a,b)=>parseFloat(a.price)-parseFloat(b.price)); break;
    case 'price_desc': items.sort((a,b)=>parseFloat(b.price)-parseFloat(a.price)); break;
    case 'name_asc': items.sort((a,b)=>(a.name||'').localeCompare(b.name||'')); break;
    case 'brand_asc': items.sort((a,b)=>(a.brandName||'').localeCompare(b.brandName||'')); break;
    case 'newest': items.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)); break;
  }

  S.filtered = items;
  renderBrowser();
}

// ── BROWSER RENDER ──────────────────────────────
function setMsg(loading, title, sub) {
  const b = document.getElementById('browser');
  b.innerHTML = '';
  const el = document.createElement('div');
  el.className = 'state-msg';
  el.innerHTML = `${loading?'<div class="spinner"></div>':''}
    <div>${title}</div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--text3)">${sub}</div>`;
  b.appendChild(el);
}

function renderBrowser() {
  const b = document.getElementById('browser');
  document.getElementById('b-count').textContent = `${S.filtered.length} items`;

  if (!S.filtered.length) {
    b.innerHTML = '<div class="state-msg"><div style="color:var(--text3);font-family:var(--mono);font-size:12px">No items match these filters</div></div>';
    return;
  }

  const grid = document.createElement('div');
  grid.className = `grid${S.view==='lg'?' lg':S.view==='lst'?' lst':''}`;

  S.filtered.forEach(item => grid.appendChild(
    S.view === 'lst' ? makeListRow(item) : makeCard(item)
  ));
  b.innerHTML = '';
  b.appendChild(grid);
}

function isSel(id) { return S.selected.some(s => s.id === id); }

function makeCard(item) {
  const img = getImg(item);
  const sel = isSel(item.id);
  const div = document.createElement('div');
  div.className = `card${sel?' sel':''}`;
  div.innerHTML = `
    <div class="card-img-wrap">
      ${img?`<img class="card-img" src="${img}" crossorigin="anonymous" loading="lazy" onload="this.classList.add('ok')" onerror="this.style.display='none'">`:'' }
      ${sel?`<div class="sel-badge">✓</div>`:''}
      <div class="card-overlay">
        <button class="ov-btn red" onclick="event.stopPropagation();toggleSel(${item.id})">${sel?'✓ Remove':'+ Select'}</button>
        <button class="ov-btn" onclick="event.stopPropagation();openModal(${item.id})">View details</button>
        <button class="ov-btn" onclick="event.stopPropagation();quickCopy(${item.id})">⎘ Copy URL</button>
      </div>
    </div>
    <div class="card-info">
      <div class="c-brand">${item.brandName||'—'}</div>
      <div class="c-name">${item.name}</div>
      <div class="c-meta">
        <div class="c-price">$${parseFloat(item.price).toFixed(2)}</div>
        <div class="c-tag">${item.size||item.sizeText||item.condition||''}</div>
      </div>
    </div>`;
  return div;
}

function makeListRow(item) {
  const img = getImg(item);
  const sel = isSel(item.id);
  const div = document.createElement('div');
  div.className = `list-row${sel?' sel':''}`;
  div.innerHTML = `
    ${img?`<img class="list-thumb" src="${img}" crossorigin="anonymous" loading="lazy">`:
    `<div class="list-thumb"></div>`}
    <div class="list-info">
      <div class="list-name">${item.name}</div>
      <div class="list-sub">${item.brandName||''} · ${getCat(item)} · ${getSellerName(item)}</div>
    </div>
    <div class="list-price">$${parseFloat(item.price).toFixed(2)}</div>
    <div class="list-acts">
      <button class="btn ${sel?'btn-dim':'btn-ghost'}" style="font-size:10px;padding:5px 10px" onclick="toggleSel(${item.id})">${sel?'✓':'+ Select'}</button>
      <button class="btn btn-ghost" style="font-size:10px;padding:5px 10px" onclick="openModal(${item.id})">Detail</button>
    </div>`;
  return div;
}

function setView(v, btn) {
  S.view = v;
  document.querySelectorAll('.vtb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderBrowser();
}

// ── SELECTION ───────────────────────────────────
function toggleSel(id) {
  const item = S.items.find(i => i.id === id);
  if (!item) return;
  const idx = S.selected.findIndex(s => s.id === id);
  if (idx !== -1) S.selected.splice(idx, 1);
  else S.selected.push(item);
  renderBrowser();
  renderPanel();
  // update modal button if open
  if (S.modalItem?.id === id) {
    document.getElementById('modal-sel-btn').textContent = isSel(id) ? '✓ Remove' : '+ Select';
  }
}

function clearSel() {
  S.selected = [];
  renderBrowser();
  renderPanel();
}

function renderPanel() {
  const cnt = document.getElementById('sel-cnt');
  const list = document.getElementById('sel-list');
  const btn = document.getElementById('btn-exp');
  cnt.textContent = `${S.selected.length} item${S.selected.length!==1?'s':''}`;
  btn.disabled = S.selected.length === 0;

  if (!S.selected.length) {
    list.innerHTML = '<div class="sel-empty">Hover any item → click<br><b style="color:var(--text2)">+ Select</b> to add it here</div>';
    return;
  }

  list.innerHTML = S.selected.map(item => {
    const img = getImg(item);
    return `<div class="sel-item">
      ${img?`<img class="sel-thumb" src="${img}" crossorigin="anonymous">`:
      `<div class="sel-thumb"></div>`}
      <div class="sel-info">
        <div class="sel-name">${item.name}</div>
        <div class="sel-meta">${item.brandName||''} · $${parseFloat(item.price).toFixed(2)}</div>
        <div class="sel-meta" style="margin-top:1px">${getSellerName(item)}</div>
      </div>
      <button class="sel-rm" onclick="toggleSel(${item.id})">×</button>
    </div>`;
  }).join('');
}

// ── DETAIL MODAL ────────────────────────────────
function openModal(id) {
  const item = S.items.find(i => i.id === id);
  if (!item) return;
  S.modalItem = item;
  const img = getImg(item);

  document.getElementById('modal-img').src = img;
  document.getElementById('modal-brand').textContent = item.brandName || '';
  document.getElementById('modal-name').textContent = item.name;
  document.getElementById('modal-price').textContent = `$${parseFloat(item.price).toFixed(2)}`;
  document.getElementById('modal-desc').textContent = item.description || '';
  document.getElementById('modal-sel-btn').textContent = isSel(id) ? '✓ Remove' : '+ Select';

  const meta = [
    ['Seller', getSellerName(item)],
    ['Category', getCat(item)],
    ['Condition', item.condition||'—'],
    ['Size', item.size||item.sizeText||'—'],
    ['Brand', item.brandName||'—'],
    ['Item ID', item.id],
  ];
  document.getElementById('modal-meta').innerHTML = meta.map(([l,v]) =>
    `<div class="modal-meta-item"><div class="mmi-label">${l}</div><div class="mmi-val">${v}</div></div>`
  ).join('');

  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  S.modalItem = null;
}

function modalToggleSel() {
  if (S.modalItem) toggleSel(S.modalItem.id);
}

function modalCopyUrl() {
  if (S.modalItem) { navigator.clipboard.writeText(getImg(S.modalItem)); toast('URL copied'); }
}

function modalDownload() {
  if (!S.modalItem) return;
  const a = document.createElement('a');
  a.href = getImg(S.modalItem);
  a.download = slugify(S.modalItem.name) + '.jpg';
  a.target = '_blank';
  a.click();
}

// ── QUICK ACTIONS ───────────────────────────────
function quickCopy(id) {
  const item = S.items.find(i => i.id === id);
  if (item) { navigator.clipboard.writeText(getImg(item)); toast('URL copied'); }
}

// ── EXPORT ──────────────────────────────────────
function slugify(s) {
  return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40);
}

async function fetchBlob(url) {
  const r = await fetch(url, {mode:'cors'});
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.blob();
}

async function removeBg(url) {
  const key = 'qsX7jB5KoGvJbMQMuPCv5zBE';
  if (!key) throw new Error('No remove.bg key. Open console and run: localStorage.setItem("rmbg","YOUR_KEY")');
  const fd = new FormData();
  fd.append('image_url', url);
  fd.append('size', 'auto');
  const r = await fetch('https://api.remove.bg/v1.0/removebg', {
    method:'POST', headers:{'X-Api-Key':key}, body:fd
  });
  if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e.errors?.[0]?.title||`remove.bg ${r.status}`); }
  return r.blob();
}

async function renderCard(item, imgBlob, {dark=false, showName=true, showPrice=true}={}) {
  // 1080x1500px — Figma 134x186 ratio scaled to Instagram quality
  const W = 1080, H = 1500;
  const RADIUS = 60; // 15px in Figma scaled up ~4x = 60px at 1080w
  const canvas = document.getElementById('cc');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  await document.fonts.ready;

  const BG  = dark ? '#0A0A0A' : '#F5F5F0';
  const FG  = dark ? '#F0EDE8' : '#0A0A0A';
  const DIM = dark ? '#555'    : '#AAAAAA';

  // ── ROUNDED RECT CLIP (entire card) ───────────
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // Clip everything to rounded rect
  roundRect(0, 0, W, H, RADIUS);
  ctx.save();
  ctx.clip();

  // Background fill
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // ── LAYOUT ────────────────────────────────────
  const PAD     = 60;   // side padding for text
  const IMG_PAD = 28;   // padding around image so it doesn't touch edges
  const BRAND_H = 140;  // top zone for brand name
  const FOOT_H  = 150;  // bottom zone for price + size
  const IMG_TOP = BRAND_H;
  const IMG_BOT = H - FOOT_H;
  const IMG_ZONE_W = W - IMG_PAD * 2;
  const IMG_ZONE_H = IMG_BOT - IMG_TOP - IMG_PAD * 2;

  // ── BRAND NAME — top center, Space Grotesk 700 ─
  if (showName && item.brandName) {
    const brand = item.brandName.toUpperCase();
    // Adaptive size based on length — keeps it on one line
    let sz = 58;
    if (brand.length > 14) sz = 48;
    if (brand.length > 20) sz = 40;
    if (brand.length > 28) sz = 33;

    ctx.font = `700 ${sz}px 'Space Grotesk', 'Syne', sans-serif`;
    ctx.fillStyle = FG;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Shrink char-by-char if still too wide
    let txt = brand;
    const maxTxtW = W - PAD * 2;
    while (ctx.measureText(txt).width > maxTxtW && txt.length > 2) {
      txt = txt.slice(0, -1);
    }
    if (txt !== brand) txt += '…';
    ctx.fillText(txt, W / 2, BRAND_H / 2);
  }

  // ── ITEM IMAGE — tight-cropped, fills image zone ─
  if (imgBlob) {
    try {
      const bmp = await createImageBitmap(imgBlob);

      // Scan pixels to find tight bounding box (eliminates transparent margins)
      const off = new OffscreenCanvas(bmp.width, bmp.height);
      const octx = off.getContext('2d');
      octx.drawImage(bmp, 0, 0);
      const px = octx.getImageData(0, 0, bmp.width, bmp.height).data;
      let x0 = bmp.width, x1 = 0, y0 = bmp.height, y1 = 0;
      for (let i = 0; i < px.length; i += 4) {
        if (px[i + 3] > 8) {
          const col = (i / 4) % bmp.width;
          const row = Math.floor((i / 4) / bmp.width);
          if (col < x0) x0 = col;
          if (col > x1) x1 = col;
          if (row < y0) y0 = row;
          if (row > y1) y1 = row;
        }
      }
      // Add 2% safety margin to avoid clipping anti-aliased edges
      const margin = Math.round(bmp.width * 0.02);
      x0 = Math.max(0, x0 - margin);
      y0 = Math.max(0, y0 - margin);
      x1 = Math.min(bmp.width,  x1 + margin);
      y1 = Math.min(bmp.height, y1 + margin);

      const cropW = x1 - x0 || bmp.width;
      const cropH = y1 - y0 || bmp.height;

      // Scale to fill the image zone as large as possible
      const scale = Math.min(IMG_ZONE_W / cropW, IMG_ZONE_H / cropH);
      const dW = cropW * scale;
      const dH = cropH * scale;
      const dX = (W - dW) / 2;
      const dY = IMG_TOP + IMG_PAD + (IMG_ZONE_H - dH) / 2;

      ctx.drawImage(bmp, x0, y0, cropW, cropH, dX, dY, dW, dH);
    } catch(e) { console.warn('Image render error:', e); }
  }

  // ── THIN SEPARATOR LINE ────────────────────────
  ctx.strokeStyle = dark ? '#222' : '#E2E0DB';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(PAD, IMG_BOT);
  ctx.lineTo(W - PAD, IMG_BOT);
  ctx.stroke();

  // ── FOOTER — price left, size right ───────────
  // All Space Grotesk 700, same weight as brand — unified type system
  const footMidY = IMG_BOT + FOOT_H / 2;

  if (showPrice) {
    // Whole dollar only — cleaner, more editorial (Depop/Grailed standard)
    const price = `$${Math.round(parseFloat(item.price))}`;
    const pSz = price.length > 5 ? 56 : 66;
    ctx.font = `700 ${pSz}px 'Space Grotesk', 'Syne', sans-serif`;
    ctx.fillStyle = FG;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(price, PAD, footMidY);
  }

  const sizeVal = (item.size || item.sizeText || '').toUpperCase();
  if (sizeVal) {
    const sSz = sizeVal.length > 7 ? 34 : sizeVal.length > 4 ? 40 : 52;
    ctx.font = `700 ${sSz}px 'Space Grotesk', 'Syne', sans-serif`;
    ctx.fillStyle = DIM;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(sizeVal, W - PAD, footMidY);
  }

  // ── [th] watermark ─────────────────────────────
  ctx.font = `300 italic 20px 'Cormorant', serif`;
  ctx.fillStyle = dark ? '#1c1c1c' : '#CCCAC5';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('[th]', W - 28, H - 22);

  ctx.restore(); // remove clip

  return new Promise(res => canvas.toBlob(b => res(b), 'image/png'));
}

async function doExport() {
  if (!S.selected.length) return;
  const wT=document.getElementById('o-transp').checked;
  const wC=document.getElementById('o-card').checked;
  const wO=document.getElementById('o-orig').checked;
  const cN=document.getElementById('o-cname').checked;
  const cP=document.getElementById('o-cprice').checked;
  const cD=document.getElementById('o-cdark').checked;

  const zip=new JSZip();
  const total=S.selected.length;
  let done=0;
  const prog=document.getElementById('exp-prog');
  const fill=document.getElementById('prog-fill');
  const lbl=document.getElementById('prog-lbl');
  const btn=document.getElementById('btn-exp');
  prog.style.display=''; btn.disabled=true; btn.textContent='Exporting...';

  for (const item of S.selected) {
    const slug=slugify(item.name)||`item-${item.id}`;
    const imgUrl=getImg(item);
    lbl.textContent=`${item.name}...`;
    fill.style.width=`${Math.round((done/total)*100)}%`;

    if (wO && imgUrl) {
      try { zip.file(`${slug}/original.jpg`, await fetchBlob(imgUrl)); } catch(e){}
    }

    let tBlob=null;
    if ((wT||wC) && imgUrl) {
      try { tBlob=await removeBg(imgUrl); if(wT) zip.file(`${slug}/transparent.png`,tBlob); }
      catch(e) {
        toast(`BG removal failed: ${e.message}`);
        try { tBlob=await fetchBlob(imgUrl); } catch(_){}
      }
    }

    if (wC && imgUrl) {
      const src=tBlob||await fetchBlob(imgUrl).catch(()=>null);
      const light=await renderCard(item,src,{dark:false,showName:cN,showPrice:cP});
      if(light) zip.file(`${slug}/card-light.png`,light);
      if(cD) { const dark=await renderCard(item,src,{dark:true,showName:cN,showPrice:cP}); if(dark) zip.file(`${slug}/card-dark.png`,dark); }
    }

    done++;
    fill.style.width=`${Math.round((done/total)*100)}%`;
  }

  lbl.textContent='Generating ZIP...';
  const zb=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(zb);
  a.download=`thursday-assets-${new Date().toISOString().slice(0,10)}.zip`;
  a.click();

  prog.style.display='none'; btn.disabled=false; btn.textContent='Export ZIP';
  toast(`Exported ${total} item${total!==1?'s':''}`);
}

// ── TOAST ───────────────────────────────────────
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
